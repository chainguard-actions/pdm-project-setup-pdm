name: Test basic usage - python-version and version
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          python-version: "3.11"
          version: "2.22.3"
      - name: Assert pdm-version output is set
        env:
          PDM_VERSION: ${{ steps.action.outputs.pdm-version }}
        run: |
          echo "pdm-version: $PDM_VERSION"
          if [ -z "$PDM_VERSION" ]; then
            echo "FAIL: pdm-version output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert pdm-bin output is set
        env:
          PDM_BIN: ${{ steps.action.outputs.pdm-bin }}
        run: |
          echo "pdm-bin: $PDM_BIN"
          if [ -z "$PDM_BIN" ]; then
            echo "FAIL: pdm-bin output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert python-version output is set
        env:
          PYTHON_VERSION: ${{ steps.action.outputs.python-version }}
        run: |
          echo "python-version: $PYTHON_VERSION"
          if [ -z "$PYTHON_VERSION" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert python-path output is set
        env:
          PYTHON_PATH: ${{ steps.action.outputs.python-path }}
        run: |
          echo "python-path: $PYTHON_PATH"
          if [ -z "$PYTHON_PATH" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert PDM is executable
        run: |
          pdm --version
          echo "PASS: pdm is on PATH"
