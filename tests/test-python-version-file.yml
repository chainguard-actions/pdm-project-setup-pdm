name: Test python-version-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create .python-version file
        run: echo "3.11" > .python-version
      - id: action
        uses: .
        with:
          python-version-file: ".python-version"
          version: "2.22.3"
      - name: Assert pdm-version output is set
        env:
          PDM_VERSION: ${{ steps.action.outputs.pdm-version }}
        run: |
          echo "pdm-version: $PDM_VERSION"
          if [ -z "$PDM_VERSION" ]; then
            echo "FAIL: pdm-version output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert python-version output is set
        env:
          PYTHON_VERSION: ${{ steps.action.outputs.python-version }}
        run: |
          echo "python-version: $PYTHON_VERSION"
          if [ -z "$PYTHON_VERSION" ]; then
            echo "FAIL: python-version output is empty"
            exit 1
          fi
          echo "PASS"
      - name: Assert PDM is executable
        run: |
          pdm --version
          echo "PASS: pdm is on PATH"
