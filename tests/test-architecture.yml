name: Test architecture input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          python-version: "3.12"
          architecture: "x64"
          version: "2.22.3"
      - name: Assert pdm-version output is set
        env:
          PDM_VERSION: ${{ steps.action.outputs.pdm-version }}
        run: |
          echo "pdm-version: $PDM_VERSION"
          if [ -z "$PDM_VERSION" ]; then
            echo "FAIL: pdm-version output is empty"
            exit 1
          fi
          echo "PASS: pdm-version=$PDM_VERSION"
      - name: Assert python-path output is set
        env:
          PY_PATH: ${{ steps.action.outputs.python-path }}
        run: |
          echo "python-path: $PY_PATH"
          if [ -z "$PY_PATH" ]; then
            echo "FAIL: python-path output is empty"
            exit 1
          fi
          echo "PASS: python-path=$PY_PATH"
      - name: Assert pdm is callable
        run: |
          pdm --version
          echo "PASS: pdm is on PATH"
